name: SDK Reliability

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev,remote]"

      - name: Ruff
        run: ruff check .

      - name: Compile Python sources
        run: python -m compileall src tests examples scripts

      - name: Pytest
        run: python -m pytest -q

      - name: Landing payload smoke test
        run: |
          node tests/landing_payload_smoke.mjs
          node tests/landing_config_smoke.mjs
          node tests/landing_compile_smoke.mjs
          node tests/commercial_contract_smoke.mjs
          node tests/checkout_claim_smoke.mjs
          node tests/seo_static_smoke.mjs

      - name: Reject whitespace damage
        run: git diff --check $(git hash-object -t tree /dev/null) HEAD

  distribution:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: python -m pip install --upgrade build

      - name: Build wheel and source archive
        run: python -m build

      - name: Audit release contents and size
        run: python scripts/check_distribution.py dist

  react_tailwind_host:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev,remote]"

      - name: Install host proof dependencies
        working-directory: tests/react-tailwind-host
        run: npm ci

      - name: Install Chromium
        working-directory: tests/react-tailwind-host
        run: npx playwright install --with-deps chromium

      - name: React Tailwind host proof
        working-directory: tests/react-tailwind-host
        run: npm run verify

      - name: Public demo browser regressions
        working-directory: tests/react-tailwind-host
        run: npm run test:site

      - name: Install verification corpus host dependencies
        working-directory: src/viewspec/host_verify_template
        run: npm ci --ignore-scripts

      - name: Verification conformance corpus
        env:
          VIEWSPEC_HOST_VERIFY_NODE_MODULES_DIR: ${{ github.workspace }}/src/viewspec/host_verify_template/node_modules
        run: python scripts/run_verification_corpus.py --install --output verification-corpus-report.json
