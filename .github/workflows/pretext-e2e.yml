name: Pretext E2E

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/pretext-e2e.yml"
      - "pyproject.toml"
      - "src/viewspec/**"
      - "tests/test_app_pretext*.py"
  pull_request:
    paths:
      - ".github/workflows/pretext-e2e.yml"
      - "pyproject.toml"
      - "src/viewspec/**"
      - "tests/test_app_pretext*.py"
  schedule:
    - cron: "17 10 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pretext-e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  browser-proof:
    name: Pretext + Freerange browser proof
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    env:
      BUN_VERSION: "1.3.14"
      CI: "1"
      LANG: "en_US.UTF-8"
      LC_ALL: "en_US.UTF-8"
      NODE_VERSION: "22.23.1"
      NPM_VERSION: "10.9.8"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PLAYWRIGHT_VERSION: "1.60.0"
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHON_VERSION: "3.11.15"
      VIEWSPEC_RUN_PRETEXT_E2E: "1"
      VIEWSPEC_PRETEXT_E2E_ARTIFACT_DIR: ${{ github.workspace }}/.artifacts/pretext-e2e

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Prepare durable artifact directory
        run: |
          mkdir -p "$VIEWSPEC_PRETEXT_E2E_ARTIFACT_DIR"
          printf 'event=%s\nrun_id=%s\nrun_attempt=%s\ncommit=%s\n' \
            "$GITHUB_EVENT_NAME" "$GITHUB_RUN_ID" "$GITHUB_RUN_ATTEMPT" "$GITHUB_SHA" \
            > "$VIEWSPEC_PRETEXT_E2E_ARTIFACT_DIR/ci-context.txt"

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: src/viewspec/host_verify_template/package-lock.json

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Record pinned toolchain
        run: |
          {
            python --version
            node --version
            npm --version
            bun --version
          } 2>&1 | tee "$VIEWSPEC_PRETEXT_E2E_ARTIFACT_DIR/toolchain.txt"
          test "$(python -c 'import platform; print(platform.python_version())')" = "$PYTHON_VERSION"
          test "$(node --version)" = "v$NODE_VERSION"
          test "$(npm --version)" = "$NPM_VERSION"
          test "$(bun --version)" = "$BUN_VERSION"

      - name: Install ViewSpec test dependencies
        run: python -m pip install ".[dev,remote]"

      - name: Install pinned Playwright package
        working-directory: src/viewspec/host_verify_template
        run: |
          npm ci --ignore-scripts
          test "$(./node_modules/.bin/playwright --version)" = "Version $PLAYWRIGHT_VERSION"
          ./node_modules/.bin/playwright --version \
            | tee -a "$VIEWSPEC_PRETEXT_E2E_ARTIFACT_DIR/toolchain.txt"

      - name: Install Playwright Chromium
        working-directory: src/viewspec/host_verify_template
        run: ./node_modules/.bin/playwright install --with-deps chromium

      - name: Run opt-in Pretext E2E proofs
        run: |
          set -o pipefail
          test "$VIEWSPEC_RUN_PRETEXT_E2E" = "1"
          python -m pytest -q --strict-markers -m e2e \
            --junitxml="$VIEWSPEC_PRETEXT_E2E_ARTIFACT_DIR/junit.xml" \
            tests/test_app_pretext_e2e.py 2>&1 \
            | tee "$VIEWSPEC_PRETEXT_E2E_ARTIFACT_DIR/pytest.log"

      - name: Validate E2E result contract
        run: >-
          python -c 'import os, xml.etree.ElementTree as ET;
          root = ET.parse(os.path.join(os.environ["VIEWSPEC_PRETEXT_E2E_ARTIFACT_DIR"], "junit.xml")).getroot();
          suites = root.findall("testsuite") if root.tag == "testsuites" else [root];
          totals = {key: sum(int(suite.attrib.get(key, 0)) for suite in suites) for key in ("tests", "failures", "errors", "skipped")};
          assert totals == {"tests": 2, "failures": 0, "errors": 0, "skipped": 0}, totals'

      - name: Upload Pretext E2E proof artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v5
        with:
          name: pretext-e2e-${{ github.run_id }}-${{ github.run_attempt }}
          path: .artifacts/pretext-e2e
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 30
