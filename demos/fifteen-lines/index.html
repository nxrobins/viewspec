<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ViewSpec Demo - 15 Lines to Full UI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      color-scheme: dark;
    }

    body {
      background: #101214;
      color: #f8fafc;
      min-height: 100vh;
    }

    .app-shell {
      display: grid;
      gap: 1rem;
      min-height: 100vh;
      padding: 1rem;
    }

    .panel {
      border: 1px solid rgba(148, 163, 184, 0.24);
      border-radius: 8px;
      overflow: hidden;
    }

    .panel-header {
      align-items: center;
      border-bottom: 1px solid rgba(148, 163, 184, 0.18);
      display: flex;
      gap: 0.75rem;
      justify-content: space-between;
      min-height: 3.25rem;
      padding: 0.75rem 1rem;
    }

    .code-panel {
      background: #0f172a;
      min-width: 0;
    }

    .output-panel {
      background: #f8fafc;
      color: #0f172a;
      min-width: 0;
    }

    .code-body {
      height: 32rem;
      overflow: auto;
      padding: 1rem 0.75rem 1.25rem;
    }

    .code-line {
      display: grid;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 0.86rem;
      grid-template-columns: 2.25rem minmax(0, 1fr);
      line-height: 1.8;
      min-height: 1.55rem;
      white-space: pre;
    }

    .line-number {
      color: #64748b;
      padding-right: 0.75rem;
      text-align: right;
      user-select: none;
    }

    .code-text {
      color: #e2e8f0;
      overflow-x: visible;
    }

    .syntax-keyword {
      color: #60a5fa;
    }

    .syntax-string {
      color: #86efac;
    }

    .syntax-class {
      color: #c4b5fd;
    }

    .syntax-method {
      color: #5eead4;
    }

    .cursor {
      animation: blink 900ms steps(2, start) infinite;
      background: #5eead4;
      display: inline-block;
      height: 1.05em;
      margin-left: 0.08rem;
      transform: translateY(0.15em);
      width: 0.55rem;
    }

    .output-body {
      background: #f8fafc;
      display: grid;
      min-height: 32rem;
      overflow: auto;
      position: relative;
    }

    .output-stage > main {
      min-height: 0;
      padding: 1.25rem;
    }

    [data-ir-id^="motif_items"]:empty {
      border: 2px dashed #e2e8f0;
      border-radius: 0.75rem;
      min-height: 3rem;
    }

    .ready-badge {
      align-items: center;
      background: #047857;
      border: 1px solid #34d399;
      border-radius: 999px;
      bottom: 1rem;
      box-shadow: 0 18px 45px rgba(4, 120, 87, 0.24);
      color: #ecfdf5;
      display: flex;
      font-size: 0.78rem;
      font-weight: 900;
      gap: 0.55rem;
      left: 1rem;
      opacity: 0;
      padding: 0.65rem 0.9rem;
      pointer-events: none;
      position: absolute;
      transform: translateY(0.8rem);
      transition: opacity 220ms ease, transform 220ms ease;
      z-index: 20;
    }

    .ready-badge::before {
      content: "\2713";
      font-size: 0.9rem;
    }

    .ready-badge.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .pill {
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.24);
      color: #cbd5e1;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 0.72rem;
      font-weight: 800;
      padding: 0.3rem 0.55rem;
      text-transform: uppercase;
    }

    .replay-button {
      border: 1px solid rgba(45, 212, 191, 0.45);
      border-radius: 999px;
      color: #ccfbf1;
      font-size: 0.8rem;
      font-weight: 900;
      padding: 0.45rem 0.75rem;
      transition: background 160ms ease, border-color 160ms ease, transform 160ms ease;
    }

    .replay-button:hover {
      background: rgba(20, 184, 166, 0.12);
      border-color: #5eead4;
      transform: translateY(-1px);
    }

    .step-meter {
      color: #475569;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 0.78rem;
      font-weight: 800;
    }

    @keyframes blink {
      0%, 45% {
        opacity: 1;
      }
      46%, 100% {
        opacity: 0;
      }
    }

    @media (min-width: 1024px) {
      .app-shell {
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      }

      .code-body,
      .output-body {
        height: calc(100vh - 5.25rem);
        min-height: 36rem;
      }
    }

    @media (max-width: 1023px) {
      .app-shell {
        min-height: 0;
      }

      .code-body,
      .output-body {
        height: 30rem;
      }
    }

    @media (max-width: 520px) {
      .app-shell {
        padding: 0.65rem;
      }

      .code-line {
        font-size: 0.74rem;
        grid-template-columns: 1.85rem minmax(0, 1fr);
      }

      .panel-header {
        align-items: flex-start;
        flex-direction: column;
      }

      .ready-badge {
        align-items: flex-start;
        border-radius: 8px;
        flex-direction: column;
        right: 1rem;
      }
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <section class="panel code-panel" aria-label="Python source">
      <header class="panel-header">
        <div>
          <div class="text-sm font-black text-white">invoice.py</div>
          <div class="mt-1 text-xs font-semibold text-slate-400">15 lines of semantic intent</div>
        </div>
        <div class="flex items-center gap-2">
          <span class="pill">Python</span>
          <button id="replay-button" type="button" class="replay-button">Replay</button>
        </div>
      </header>
      <div class="code-body">
        <pre class="m-0"><code id="code-display" aria-live="polite"></code></pre>
      </div>
    </section>

    <section class="panel output-panel" aria-label="Rendered output">
      <header class="panel-header bg-white">
        <div>
          <div class="text-sm font-black text-slate-950">Rendered Output</div>
          <div class="mt-1 text-xs font-semibold text-slate-500">Reference compiler artifact</div>
        </div>
        <div class="step-meter">step <span id="step-count">1</span>/9</div>
      </header>
      <div class="output-body">
        <div id="output-display" class="output-stage"></div>
        <div id="ready-badge" class="ready-badge">
          <span>Bundle Ready</span>
          <span id="ready-stats"></span>
        </div>
      </div>
    </section>
  </main>

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function setOutput(step) {
      outputDisplay.innerHTML = FRAGMENTS[step] || '';
      stepCount.textContent = String(step + 1);
    }

    function clearTimer() {
      if (timer !== null) {
        window.clearTimeout(timer);
        timer = null;
      }
    }

    function schedule(callback, delay) {
      clearTimer();
      timer = window.setTimeout(callback, delay);
    }

    function renderCodeRows() {
      codeDisplay.innerHTML = CODE_LINES.map((line, index) => `
        <div class="code-line" data-line="${index + 1}">
          <span class="line-number">${String(index + 1).padStart(2, '0')}</span>
          <span class="code-text"></span>
        </div>
      `).join('');
      lineNodes = Array.from(codeDisplay.querySelectorAll('.code-text'));
    }

    function showReadyBadge() {
      readyStats.textContent = `${FINAL_STATS.bindingCount} bindings | ${FINAL_STATS.semanticNodeCount} nodes | full provenance`;
      readyBadge.classList.add('visible');
    }

    function typeNext() {
      if (lineIndex >= CODE_LINES.length) return;

      const line = CODE_LINES[lineIndex];
      const lineNode = lineNodes[lineIndex];
      if (!lineNode) return;

      if (charIndex < line.text.length) {
        charIndex += 1;
        lineNode.innerHTML = `${escapeHtml(line.text.slice(0, charIndex))}<span class="cursor"></span>`;
        const charDelay = 24 + ((lineIndex * 11 + charIndex * 17) % 26);
        schedule(typeNext, charDelay);
        return;
      }

      lineNode.innerHTML = `${line.html}<span class="cursor"></span>`;
      if (Number.isInteger(line.outputStep)) {
        setOutput(line.outputStep);
      }
      if (line.final) {
        showReadyBadge();
      }

      const pause = line.text.length ? 390 : 230;
      schedule(() => {
        lineNode.innerHTML = line.html;
        lineIndex += 1;
        charIndex = 0;
        if (lineIndex < CODE_LINES.length) {
          lineNodes[lineIndex].innerHTML = '<span class="cursor"></span>';
          typeNext();
        }
      }, pause);
    }

    function startDemo() {
      clearTimer();
      lineIndex = 0;
      charIndex = 0;
      renderCodeRows();
      setOutput(0);
      readyBadge.classList.remove('visible');
      readyStats.textContent = '';
      schedule(typeNext, 250);
    }

  <script>
document.addEventListener('click', (e) => {
  const btn = e.target.closest('[data-action-id]');
  if (!btn) return;
  const detail = {
    id: btn.dataset.actionId,
    kind: btn.dataset.actionKind,
    payloadBindings: JSON.parse(btn.dataset.payloadBindings || '[]')
  };
  document.dispatchEvent(new CustomEvent('viewspec-action', { detail }));
  console.log('Action Dispatched:', detail);
});
</script>
</body>
</html>
